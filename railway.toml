# Railway multi-service configuration for Koblio
#
# IMPORTANT — First deploy checklist:
#   1. Set all environment variables in the Railway dashboard for each service
#      (see apps/api/.env.example for the full list).
#   2. The API CMD runs `prisma migrate deploy` before starting the server.
#      This is safe for zero-downtime rolling deploys because Prisma migrate
#      deploy only applies pending migrations.
#   3. Attach a Railway PostgreSQL plugin to koblio-api and Railway will
#      inject DATABASE_URL automatically.
#
# Railway docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"

# ─── API service ──────────────────────────────────────────────────────────────
[[services]]
name = "koblio-api"
source = "."
dockerfile = "apps/api/Dockerfile"

[services.deploy]
startCommand = "sh -c 'prisma migrate deploy && node dist/main.js'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300

# ─── Web service ──────────────────────────────────────────────────────────────
[[services]]
name = "koblio-web"
source = "."
dockerfile = "apps/web/Dockerfile"

[services.deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
